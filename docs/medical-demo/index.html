<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>目標畫面（線上示範）— 康和智慧診所候診看板</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link href="assets/css/style.css" rel="stylesheet" />
</head>
<body>
  <div class="alert alert-warning rounded-0 mb-0 text-center small">
    這是<strong>目標畫面示範</strong>，讓你確認功能行為用的，不是給你抄程式碼的地方。
  </div>

  <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container d-flex justify-content-between">
      <span class="navbar-brand mb-0 h1">康和智慧診所 - 候診看板</span>
      <button
        type="button"
        class="btn btn-light"
        data-bs-toggle="modal"
        data-bs-target="#addPatientModal"
      >
        + 臨時掛號
      </button>
    </div>
  </nav>

  <main class="container pb-5">
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="card text-center shadow-sm">
          <div class="card-body">
            <div class="text-body-secondary small">今日總人數</div>
            <div class="fs-3 fw-bold" id="stat-total">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card text-center shadow-sm">
          <div class="card-body">
            <div class="text-body-secondary small">候診中</div>
            <div class="fs-3 fw-bold text-warning" id="stat-waiting">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card text-center shadow-sm">
          <div class="card-body">
            <div class="text-body-secondary small">看診中</div>
            <div class="fs-3 fw-bold text-info" id="stat-in-consultation">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card text-center shadow-sm">
          <div class="card-body">
            <div class="text-body-secondary small">已完成</div>
            <div class="fs-3 fw-bold text-success" id="stat-done">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex flex-column flex-md-row gap-3 mb-3 align-items-md-center">
      <input
        type="text"
        id="search-input"
        class="form-control"
        style="max-width: 20rem"
        placeholder="搜尋病患姓名..."
      />
      <div class="btn-group" role="group" id="filter-buttons" aria-label="狀態篩選">
        <button type="button" class="btn btn-outline-primary active" data-status="all">全部</button>
        <button type="button" class="btn btn-outline-primary" data-status="waiting">候診中</button>
        <button type="button" class="btn btn-outline-primary" data-status="in-consultation">看診中</button>
        <button type="button" class="btn btn-outline-primary" data-status="done">已完成</button>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle bg-white">
        <thead>
          <tr>
            <th>姓名</th>
            <th>電話</th>
            <th>預約時間</th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="patient-table-body">
          <!-- render() 會把病患資料渲染到這裡 -->
        </tbody>
      </table>
    </div>
  </main>

  <div class="modal fade" id="addPatientModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="add-patient-form" novalidate>
          <div class="modal-header">
            <h5 class="modal-title">臨時掛號</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="alert alert-danger d-none" id="form-error"></div>
            <div class="mb-3">
              <label for="patient-name" class="form-label">姓名 <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="patient-name" />
            </div>
            <div class="mb-3">
              <label for="patient-phone" class="form-label">電話</label>
              <input type="text" class="form-control" id="patient-phone" />
            </div>
            <div class="mb-3">
              <label for="patient-time" class="form-label">到診時間</label>
              <input type="time" class="form-control" id="patient-time" />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
            <button type="submit" class="btn btn-primary">送出掛號</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
